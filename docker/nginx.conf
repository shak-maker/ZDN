# =============================================================================
# ZDN Measurement Reports — Production Nginx (reverse proxy)
# - Serves React static from frontend container, proxies /api to NestJS
# - Gzip, caching, security headers, HTTPS-ready, large uploads
# =============================================================================

upstream frontend {
    server frontend:80;
    keepalive 16;
}

upstream backend {
    server backend:3001;
    keepalive 8;
}

# Redirect HTTP to HTTPS when behind TLS terminator (uncomment if needed)
# server { listen 80; return 301 https://$host$request_uri; }

server {
    listen 80;
    server_name _;

    # -------------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # -------------------------------------------------------------------------
    # API — NestJS backend
    # -------------------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Large file uploads (e.g. reports with attachments)
        client_max_body_size 50M;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health (optional: expose for load balancer)
    location /health/ {
        proxy_pass http://backend/health/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # -------------------------------------------------------------------------
    # Frontend — static assets from frontend container
    # -------------------------------------------------------------------------
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # -------------------------------------------------------------------------
    # Gzip
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/plain
        text/xml;

    # -------------------------------------------------------------------------
    # Caching for static assets (hash-based filenames from Vite)
    # -------------------------------------------------------------------------
    location ~* \.(js|css|woff2?|ico|png|jpg|jpeg|gif|svg|webp)$ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
