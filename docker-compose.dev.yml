# =============================================================================
# ZDN Measurement Reports — Development
# =============================================================================
# Usage: docker compose -f docker-compose.dev.yml up
# - Hot reload: NestJS (start:dev), Vite (npm run dev)
# - MySQL on port 3306 for backend; use DATABASE_URL in .env
# - Frontend dev server on 5173; Nginx on 80 (proxies /api to backend)
# =============================================================================

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-devroot}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-zdn_db}
      MYSQL_USER: ${MYSQL_USER:-zdn_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-zdn_password}
    volumes:
      - mysql_dev_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: deps
    image: zdn-backend-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: mysql://${MYSQL_USER:-zdn_user}:${MYSQL_PASSWORD:-zdn_password}@mysql:3306/${MYSQL_DATABASE:-zdn_db}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-minimum-32-characters}
      JWT_EXPIRES_IN: 24h
      API_KEY_SECRET: ${API_KEY_SECRET:-dev-api-key-secret}
      FRONTEND_URL: http://localhost:5173
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npx prisma generate && npm run start:dev"
    networks:
      - internal
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps
    image: zdn-frontend-dev
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: /api
    command: npm run dev
    networks:
      - internal
    ports:
      - "5173:5173"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx-dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  mysql_dev_data:
